###############################################################################
# NETLIFY DEPLOYMENT CONFIGURATION FOR MERN STACK
# ============================================================================
# Project Structure:
#   - Frontend: client/ (React + Vite)
#   - Backend: server/ (Node.js) - deployed separately on Render
#   - This netlify.toml deploys ONLY the frontend
#
# Backend URL: https://ravi-maligai.onrender.com
# This configuration OVERRIDES any Netlify UI settings
###############################################################################

[build]
  # =========================================================================
  # CRITICAL: Base directory is where the frontend app is located
  # This tells Netlify to run all build steps from inside client/
  # =========================================================================
  base = "client"
  
  # =========================================================================
  # Build command: Run from inside the client/ directory
  # npm run build = vite build (defined in client/package.json)
  # Vite will automatically load .env.production for VITE_API_URL
  # =========================================================================
  command = "npm run build"
  
  # =========================================================================
  # CRITICAL: Publish directory is RELATIVE to the base directory
  # This means: client/dist/
  # DO NOT use "client/dist" here - only "dist"
  # Netlify UI may show it as "client/dist" but that's just the full path
  # =========================================================================
  publish = "dist"
  
  # =========================================================================
  # Build functions (if using Netlify Functions in the future)
  # =========================================================================
  # functions = "netlify/functions"

[build.environment]
  # Ensure Node.js version compatibility
  NODE_VERSION = "18"
  
  # CRITICAL: Set NODE_ENV to production for Vite optimization
  NODE_ENV = "production"
  
  # Optional: Disable telemetry for faster builds
  DISABLE_TELEMETRY = "true"

###############################################################################
# FRONTEND BUILD LOGS & CONFIGURATION
###############################################################################
[build.processing]
  # Skip unnecessary processing
  skip_processing = false

###############################################################################
# SPA ROUTING CONFIGURATION FOR REACT ROUTER
# ============================================================================
# This ensures React Router works correctly by serving index.html
# for all non-file requests, allowing client-side routing to work
###############################################################################
[[redirects]]
  # Match any path that doesn't have a file extension
  # This regex means: "any path that doesn't end with a file extension"
  from = "/*"
  to = "/index.html"
  status = 200
  # force = false  # Don't force redirect if file exists

###############################################################################
# SECURITY & PERFORMANCE HEADERS
###############################################################################

# Default headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    # Allow cross-origin API requests to Render backend
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    
    # Security headers
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"

# Cache optimization for static assets (built by Vite with content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache static assets for 1 year (safe because files have content hashes)
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the main HTML file to always get the latest version
[[headers]]
  for = "/index.html"
  [headers.values]
    # Validate with server on every request
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "text/html; charset=utf-8"
