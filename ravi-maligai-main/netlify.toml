# Netlify deployment configuration for Vite React frontend
# Frontend: React + Vite (located in client/ folder)
# Backend: https://ravi-maligai.onrender.com
# This configuration overrides any Netlify UI settings

[build]
  # Base directory: the root of the frontend project
  base = "client"
  
  # Build command: runs from the client directory
  # Vite will use .env.production for VITE_API_URL
  command = "npm run build"
  
  # Publish directory: the optimized dist folder from Vite (relative to base)
  # This is NOT client/dist - it's dist/ relative to the base directory
  publish = "dist"

# Environment variables for the build
[build.environment]
  # Node version - ensure compatibility with dependencies
  NODE_VERSION = "18"
  
  # Vite requires NODE_ENV for optimization
  NODE_ENV = "production"

# Redirects for single-page application (SPA)
# This ensures all routes are served by index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for security and API configuration
[[headers]]
  for = "/*"
  [headers.values]
    # Allow cross-origin requests if needed for API calls
    Access-Control-Allow-Origin = "*"
    # Cache control for static assets
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# Cache settings for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache static assets for 1 year (they have content hashes)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache the HTML file to always get latest version
    Cache-Control = "public, max-age=0, must-revalidate"
